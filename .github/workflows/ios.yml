name: iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
      - codex/**
      - native/**
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project SourceReadSwift.xcodeproj \
            -scheme SourceReadSwift \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild-build.log

      - name: Summarize build failure
        if: failure()
        run: |
          if [ -f xcodebuild-build.log ]; then
            grep -E "error:|fatal error:" xcodebuild-build.log | tail -n 80 | while IFS= read -r line; do
              echo "::error::$line"
            done
            tail -n 220 xcodebuild-build.log
          fi

      - name: Test
        run: |
          set -euo pipefail
          DEVICE_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          xcodebuild \
            -project SourceReadSwift.xcodeproj \
            -scheme SourceReadSwift \
            -destination "id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee xcodebuild-test.log

      - name: Summarize test failure
        if: failure()
        run: |
          if [ -f xcodebuild-test.log ]; then
            grep -E "error:|fatal error:|failed:" xcodebuild-test.log | tail -n 80 | while IFS= read -r line; do
              echo "::error::$line"
            done
            tail -n 220 xcodebuild-test.log
          fi
