name: Auto Merge Branches

on:
  push:
    branches:
      - '**'           # 监听所有分支的推送
      - '!master'      # 排除目标分支自身，避免循环

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Fetch all branches
        run: git fetch origin

      - name: Try to merge and resolve conflicts
        id: merge
        continue-on-error: true
        run: |
          git checkout master
          git pull origin master
          git merge --no-ff ${{ github.ref_name }} --strategy-option theirs || true
          if [ -f .git/MERGE_HEAD ]; then
            echo "conflict=true" >> $GITHUB_OUTPUT
          else
            echo "conflict=false" >> $GITHUB_OUTPUT
          fi

      - name: Push merged changes if no conflict
        if: steps.merge.outputs.conflict == 'false'
        run: |
          git push origin master

      - name: Create or update Pull Request if conflict
        if: steps.merge.outputs.conflict == 'true'
        id: create-pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.ref_name }}
          destination_branch: master
          pr_title: "自动合并 ${{ github.ref_name }}"
          pr_body: "由 GitHub Actions 自动创建的合并请求\n\n⚠️ 检测到冲突，需要人工审查解决"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on PR
        if: steps.create-pr.outputs.pr_number != ''
        run: |
          pr_number=${{ steps.create-pr.outputs.pr_number }}
          gh pr merge $pr_number --auto --merge -R ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
