name: read
description: "阅读 - 一款精美的 iOS 阅读器应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 本地数据库
  isar: 3.0.5
  isar_flutter_libs: 3.0.5

  # ePub 解析
  epubx: ^3.0.0
  
  # PDF 渲染
  pdfrx: ^1.0.60

  # HTTP 客户端
  dio: ^5.7.0
  http: ^1.6.0

  # HTML/XML 解析
  html: ^0.15.5
  csslib: ^1.0.0
  xml: any
  xpath_selector: ^3.0.2
  xpath_selector_html_parser: 3.0.1
  flutter_html: ^3.0.0-beta.2

  # 文件操作
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^11.3.1

  # TTS
  flutter_tts: ^4.2.0

  # 动画
  flutter_animate: ^4.5.2

  # 字体
  google_fonts: ^6.2.1

  # 图片缓存
  cached_network_image: ^3.4.1

  # 持久化
  shared_preferences: ^2.3.5

  # 无限滚动
  infinite_scroll_pagination: ^4.1.0

  # 其他工具
  uuid: ^4.5.1
  charset_converter: ^2.1.2
  crypto: ^3.0.6
  intl: ^0.19.0
  collection: ^1.19.0
  fast_gbk: ^1.0.0
  json_path: ^0.6.3
  webview_flutter: ^4.7.0
  quickjs_engine: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: any
  isar_generator: 3.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
