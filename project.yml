name: SourceReadSwift
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.8.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
targets:
  SourceReadSwift:
    type: application
    platform: iOS
    sources:
      - SourceReadSwift
    dependencies:
      - package: SwiftSoup
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edc21.SourceReadSwift
        INFOPLIST_FILE: SourceReadSwift/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: SourceReadSwift/SourceReadSwift.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: SourceReadSwift/App/Info.plist
      properties:
        CFBundleDisplayName: SourceReadSwift
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: 用于在局域网内导入、导出和管理书源。
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Readable text, EPUB and source JSON
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.json
              - public.text
              - public.plain-text
              - public.data
              - org.idpf.epub-container
  SourceReadSwiftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SourceReadSwiftTests
    dependencies:
      - target: SourceReadSwift
      - package: SwiftSoup
      - package: ZIPFoundation
